name: Build IPA

# Lets the backend match this run to the right job unambiguously instead of
# guessing by timestamp — see _find_github_run_id in the backend's tasks.py.
run-name: "ipa-build-${{ inputs.job_id }}"

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "FrontendX job UUID (leave blank to run a smoke test with a dummy ID)"
        required: false
        default: "test-manual-run"
        type: string
      branch:
        description: "Branch containing project.zip"
        required: false
        default: "main"
        type: string

# Serialize all builds: `match` mutates the shared certs/profiles git repo
# (MATCH_GIT_URL), which is shared across every app this builds. Concurrent
# runs can race on cloning/pushing that repo and corrupt it, breaking
# signing for every subsequent build until someone manually fixes it up.
concurrency:
  group: ios-build-ipa-match-certs
  cancel-in-progress: false

jobs:
  build:
    # Pinned to avoid silent environment changes when GitHub bumps macos-latest
    # to a new OS/Xcode image. Update deliberately alongside any Xcode-version-
    # sensitive changes (module map fixes, xcargs, etc.).
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      # Pinned to a tested Xcode version. When upgrading: bump here, verify the
      # CLANG_ENABLE_EXPLICIT_MODULES=NO xcargs still applies correctly, and
      # update this comment. macos-15 ships Xcode 16.x; 16.3 is the tested baseline.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.3"

      # `runs-on: macos-latest` is a GitHub-hosted, ephemeral VM — wiped after
      # every job — so this is normally a no-op. It's kept as a cheap guard in
      # case this workflow is ever pointed at a self-hosted/persistent runner,
      # where leftovers from a previous run (project/, build/, DerivedData,
      # CocoaPods caches) could otherwise corrupt or stale-out this run.
      # Xcode 16.3 on macos-15 runners ships with the iPhoneOS18.4.sdk but the
      # iOS platform device-support files are not pre-installed. Without them
      # xcodebuild cannot resolve `generic/platform=iOS` (the destination used
      # for archiving) and exits 70 with "iOS 18.4 is not installed".
      # -downloadPlatform iOS fetches only the iOS platform files (not all
      # platforms) and is idempotent — a no-op if already present.
      - name: Install iOS platform support files
        run: xcodebuild -downloadPlatform iOS

      - name: Clean workspace from previous run
        run: |
          rm -rf project project.zip build
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

      # Always check out main so the workflow uses the latest Fastfile/Gemfile.
      # project.zip lives on the build branch — we fetch just that file.
      - name: Checkout ipa-builder repo (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Extract project.zip from build branch
        # inputs.branch is always backend-generated ("build/<job-uuid>"), never
        # raw user text, but route it through env: rather than interpolating
        # ${{ }} directly into the script — that's the standard GitHub Actions
        # script-injection pattern, and this keeps the workflow safe even if
        # how `branch` is constructed ever changes.
        env:
          BUILD_BRANCH: ${{ inputs.branch }}
        run: |
          git fetch origin "$BUILD_BRANCH" 2>/dev/null || true
          if git ls-remote --exit-code origin "$BUILD_BRANCH" > /dev/null 2>&1; then
            git checkout "origin/$BUILD_BRANCH" -- project.zip
          else
            echo "::warning::Branch '$BUILD_BRANCH' not found — no project.zip to extract. This is expected for a manual smoke test."
            echo "SKIP_BUILD=true" >> "$GITHUB_ENV"
          fi

      - name: Unzip project
        if: env.SKIP_BUILD != 'true'
        run: |
          mkdir -p project
          unzip -q project.zip -d project

      # Copy Fastlane config files into the project directory so
      # `bundle exec fastlane` finds them when run from project/.
      - name: Copy Fastlane files into project
        if: env.SKIP_BUILD != 'true'
        run: |
          cp Gemfile project/Gemfile
          # Copy lock file so bundle install uses the exact pinned versions
          # rather than re-resolving from the Gemfile ranges on every run.
          [ -f Gemfile.lock ] && cp Gemfile.lock project/Gemfile.lock || true
          cp -r fastlane project/fastlane

      # Derive bundle ID and Xcode scheme from app.json so every generated
      # app gets its own unique identity without any manual secret management.
      - name: Derive bundle ID and scheme from app.json
        if: env.SKIP_BUILD != 'true'
        id: appinfo
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: |
          APP_JSON="project/app.json"

          RAW_NAME=$(python3 -c "
          import json
          data = json.load(open('$APP_JSON'))
          name = data.get('expo', data).get('name', 'frontendxapp')
          print(name)
          ")

          # Sanitize name for bundle ID: lowercase, alphanumeric + hyphens only
          SAFE_NAME=$(echo "$RAW_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

          # A name made entirely of symbols/emoji sanitizes to "", which would
          # produce an invalid bundle ID with a trailing dot (com.frontendx.).
          # Fall back to a job-scoped name (not a fixed string) so two
          # different empty-name apps don't collide on the same bundle ID and
          # silently share one App Store Connect app record.
          SAFE_NAME="${SAFE_NAME:-app-${JOB_ID:0:8}}"

          BUNDLE_ID="com.frontendx.${SAFE_NAME}"

          echo "bundle_id=$BUNDLE_ID"   >> "$GITHUB_OUTPUT"
          echo "scheme=$RAW_NAME"       >> "$GITHUB_OUTPUT"
          echo "safe_name=$SAFE_NAME"   >> "$GITHUB_OUTPUT"

          echo "Derived bundle ID : $BUNDLE_ID"
          echo "Derived scheme    : $RAW_NAME"

      # Inject the generated bundle ID into app.json before expo prebuild
      # so the native Xcode project is generated with the correct identifier.
      - name: Patch app.json with derived bundle ID
        if: env.SKIP_BUILD != 'true'
        run: |
          python3 - <<'EOF'
          import json

          path = "project/app.json"
          with open(path) as f:
              data = json.load(f)

          bundle_id = "${{ steps.appinfo.outputs.bundle_id }}"

          root = data.get("expo", data)
          root.setdefault("ios", {})["bundleIdentifier"] = bundle_id
          root.setdefault("android", {})["package"] = bundle_id.replace("-", "_")

          with open(path, "w") as f:
              json.dump(data, f, indent=2)

          print(f"Patched bundleIdentifier → {bundle_id}")
          EOF

      # Register the bundle ID via ASC REST API (idempotent).
      # App Store Connect app creation is handled by `produce` in the Fastlane
      # build_ipa lane — the REST API forbids POST /v1/apps for standard accounts.
      - name: Register bundle ID
        if: env.SKIP_BUILD != 'true'
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_BUNDLE_ID: ${{ steps.appinfo.outputs.bundle_id }}
          XCODE_SCHEME: ${{ steps.appinfo.outputs.scheme }}
        run: |
          ruby - <<'RUBY'
          require 'openssl'
          require 'base64'
          require 'json'
          require 'net/http'
          require 'uri'
          require 'time'

          key_id    = ENV['APP_STORE_CONNECT_KEY_ID']
          issuer_id = ENV['APP_STORE_CONNECT_ISSUER_ID']
          bundle_id = ENV['APP_BUNDLE_ID']
          app_name  = ENV['XCODE_SCHEME']

          private_key = OpenSSL::PKey::EC.new(ENV['APP_STORE_CONNECT_API_KEY'])

          def make_jwt(private_key, key_id, issuer_id)
            header  = Base64.urlsafe_encode64({ alg: 'ES256', kid: key_id, typ: 'JWT' }.to_json).tr('=', '')
            now     = Time.now.to_i
            payload = Base64.urlsafe_encode64({ iss: issuer_id, iat: now, exp: now + 1200, aud: 'appstoreconnect-v1' }.to_json).tr('=', '')
            signing_input = "#{header}.#{payload}"
            der = private_key.sign(OpenSSL::Digest::SHA256.new, signing_input)
            asn = OpenSSL::ASN1.decode(der)
            r   = asn.value[0].value.to_s(2).rjust(32, "\x00")[-32..]
            s   = asn.value[1].value.to_s(2).rjust(32, "\x00")[-32..]
            "#{signing_input}.#{Base64.urlsafe_encode64(r + s).tr('=', '')}"
          end

          http = Net::HTTP.new('api.appstoreconnect.apple.com', 443)
          http.use_ssl = true

          def headers(token)
            { 'Authorization' => "Bearer #{token}", 'Content-Type' => 'application/json' }
          end

          # Register bundle ID (idempotent — 409 means already exists)
          token = make_jwt(private_key, key_id, issuer_id)
          req = Net::HTTP::Post.new('/v1/bundleIds', headers(token))
          req.body = {
            data: {
              type: 'bundleIds',
              attributes: { identifier: bundle_id, name: app_name, platform: 'IOS' }
            }
          }.to_json
          resp = http.request(req)
          if resp.code == '409'
            puts "Bundle ID #{bundle_id} already registered."
          elsif resp.code.start_with?('2')
            puts "Registered bundle ID #{bundle_id}."
          else
            puts "ERROR registering bundle ID (#{resp.code}): #{resp.body}"
            exit 1
          end
          RUBY

      - name: Setup Node.js
        if: env.SKIP_BUILD != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS dependencies
        if: env.SKIP_BUILD != 'true'
        working-directory: project
        run: npm install

      - name: Expo prebuild (generate native iOS project)
        if: env.SKIP_BUILD != 'true'
        working-directory: project
        # --no-install skips the pod install that expo prebuild runs internally.
        # We patch the Podfile in the Fastlane lane first (strip legacy
        # withExplicitModules post_install block, inject use_frameworks!) before
        # running pod install ourselves — if prebuild runs pod install here it
        # sees the duplicate post_install block and hard-fails before we can fix it.
        run: npx expo prebuild --clean --platform ios --no-install

      # Detect the actual Xcode scheme from the generated project.
      # The scheme file name is the source of truth — safer than relying on
      # app.json name which may be normalized differently by expo prebuild.
      - name: Detect Xcode scheme
        if: env.SKIP_BUILD != 'true'
        id: scheme
        env:
          RAW_NAME: ${{ steps.appinfo.outputs.scheme }}
        run: |
          # Exclude ios/Pods/** — CocoaPods generates a .xcscheme per installed
          # pod alongside the app scheme; find's order is non-deterministic so
          # filtering is required to avoid picking the wrong scheme.
          # Note: mapfile is not used — macOS ships Bash 3.2 which lacks it.
          SCHEME_FILE_LIST=$(find project/ios -name "*.xcscheme" -not -path "*/Pods/*" 2>/dev/null || true)
          COUNT=$(echo "$SCHEME_FILE_LIST" | grep -c '[^[:space:]]' || true)

          if [ "$COUNT" -eq 0 ]; then
            echo "No .xcscheme found — falling back to app.json name"
            SCHEME="$RAW_NAME"
          elif [ "$COUNT" -eq 1 ]; then
            SCHEME=$(basename "$SCHEME_FILE_LIST" .xcscheme)
          else
            # Multiple schemes: prefer one whose filename matches the sanitized app name
            SAFE=$(echo "$RAW_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')
            MATCH=$(echo "$SCHEME_FILE_LIST" | while IFS= read -r f; do
              [ -z "$f" ] && continue
              base=$(basename "$f" .xcscheme)
              base_lower=$(echo "$base" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')
              if [ "$base_lower" = "$SAFE" ]; then echo "$base"; break; fi
            done)
            if [ -n "$MATCH" ]; then
              SCHEME="$MATCH"
            else
              SCHEME=$(echo "$SCHEME_FILE_LIST" | xargs -I{} basename {} .xcscheme | sort | head -1)
              echo "::warning::Multiple schemes found — picked '$SCHEME'. Verify this is the app target."
            fi
          fi

          echo "name=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Detected scheme: $SCHEME"

      - name: List ios directory (debug)
        if: env.SKIP_BUILD != 'true'
        run: find project/ios -maxdepth 3 -name "*.xcworkspace" -o -name "*.xcodeproj" | head -20

      # bundler-cache is off because the current Gemfile.lock was generated with
      # an older Bundler that omitted CHECKSUMS — Bundler 4.x rejects it in
      # frozen/deployment mode with exit 16. Re-run the generate-lockfile
      # workflow (which now uses Bundler 4.x) to regenerate Gemfile.lock with
      # checksums, then flip bundler-cache back to true.
      - name: Setup Ruby + Bundler
        if: env.SKIP_BUILD != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false
          working-directory: project

      - name: Install gems
        if: env.SKIP_BUILD != 'true'
        working-directory: project
        run: |
          bundle config set frozen false
          bundle install --jobs 4 --retry 3

      # Fast-fail before Fastlane if FASTLANE_SESSION is missing or expired.
      # Apple session tokens last ~30 days; when expired Spaceship falls back
      # to an interactive 2FA prompt that never resolves on a CI runner,
      # silently consuming the entire 45-minute Fastlane timeout.
      # Regenerate with: fastlane spaceauth -u your@apple.id
      - name: Check FASTLANE_SESSION validity
        if: env.SKIP_BUILD != 'true'
        env:
          FASTLANE_SESSION: ${{ secrets.FASTLANE_SESSION }}
        run: |
          if [ -z "$FASTLANE_SESSION" ]; then
            echo "::error::FASTLANE_SESSION secret is empty. Regenerate with: fastlane spaceauth -u your@apple.id"
            exit 1
          fi
          EXPIRY=$(echo "$FASTLANE_SESSION" | python3 -c "
          import sys, re
          content = sys.stdin.read()
          match = re.search(r'expires:\s*(\d{4}-\d{2}-\d{2})', content)
          print(match.group(1) if match else 'unknown')
          ")
          if [ "$EXPIRY" = "unknown" ]; then
            echo "::warning::Could not parse FASTLANE_SESSION expiry — session may be expired."
          else
            TODAY=$(date -u +%Y-%m-%d)
            if [[ "$EXPIRY" < "$TODAY" ]]; then
              echo "::error::FASTLANE_SESSION expired on $EXPIRY (today is $TODAY). Regenerate with: fastlane spaceauth -u your@apple.id"
              exit 1
            fi
            echo "FASTLANE_SESSION valid until $EXPIRY"
          fi

      - name: Run Fastlane build_ipa
        if: env.SKIP_BUILD != 'true'
        working-directory: project
        # Timeout guards against any residual interactive prompts that slip
        # past the session check above (e.g. an unexpected 2FA challenge mid-lane).
        timeout-minutes: 45
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_PAT_B64: ${{ secrets.MATCH_GIT_PAT_B64 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_FILEPATH: /tmp/authkey.p8
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          MATCH_KEYCHAIN_NAME: "fastlane_match_keychain"
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_COMPANY_NAME: ${{ secrets.APPLE_COMPANY_NAME }}
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          FASTLANE_SESSION: ${{ secrets.FASTLANE_SESSION }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ITC_TEAM_ID: ${{ secrets.APPLE_ITC_TEAM_ID }}
          # Auto-derived per app — not stored as secrets
          APP_BUNDLE_ID: ${{ steps.appinfo.outputs.bundle_id }}
          XCODE_SCHEME: ${{ steps.scheme.outputs.name }}
        run: |
          printf '%s' "$APP_STORE_CONNECT_API_KEY" > /tmp/authkey.p8
          bundle exec fastlane ios build_ipa

      - name: Upload IPA artifact
        id: upload_artifact
        if: success() && env.SKIP_BUILD != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa-${{ inputs.job_id }}
          path: project/build/app.ipa
          retention-days: 7

      # gym's own log (the one "see the log above" points at) only ever lived
      # in the runner's scrollback otherwise — every prior failure required
      # scrolling/pasting Actions UI output by hand to see the actual
      # xcodebuild error. Upload it as a downloadable artifact instead.
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ inputs.job_id }}
          path: |
            /Users/runner/Library/Logs/gym/*.log
            /tmp/priming_build.log
            /tmp/pod_install.log
          if-no-files-found: ignore
          retention-days: 7

      # No callback step needed — the backend polls GitHub Actions API directly.
