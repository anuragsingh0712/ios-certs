name: Build IPA

# Lets the backend match this run to the right job unambiguously instead of
# guessing by timestamp — see _find_github_run_id in the backend's tasks.py.
run-name: "ipa-build-${{ inputs.job_id }}"

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "FrontendX job UUID"
        required: true
        type: string
      branch:
        description: "Branch containing project.zip"
        required: false
        default: "main"
        type: string

# Serialize all builds: `match` mutates the shared certs/profiles git repo
# (MATCH_GIT_URL), which is shared across every app this builds. Concurrent
# runs can race on cloning/pushing that repo and corrupt it, breaking
# signing for every subsequent build until someone manually fixes it up.
concurrency:
  group: ios-build-ipa-match-certs
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      # Use latest-stable so this works regardless of which Xcode versions the
      # runner image ships. The gym step's ENABLE_EXPLICIT_MODULES_SUPPORT=NO
      # xcargs handles Xcode 26's "Explicitly Built Modules" module map failure;
      # it is a no-op on Xcode 16 so the workflow is safe on both image variants.
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Always check out main so the workflow uses the latest Fastfile/Gemfile.
      # project.zip lives on the build branch — we fetch just that file.
      - name: Checkout ipa-builder repo (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract project.zip from build branch
        run: |
          git fetch origin ${{ inputs.branch }}
          git checkout origin/${{ inputs.branch }} -- project.zip

      - name: Unzip project
        run: |
          mkdir -p project
          unzip -q project.zip -d project

      # Copy Fastlane config files into the project directory so
      # `bundle exec fastlane` finds them when run from project/.
      - name: Copy Fastlane files into project
        run: |
          cp Gemfile project/Gemfile
          cp -r fastlane project/fastlane

      # Derive bundle ID and Xcode scheme from app.json so every generated
      # app gets its own unique identity without any manual secret management.
      - name: Derive bundle ID and scheme from app.json
        id: appinfo
        run: |
          APP_JSON="project/app.json"

          RAW_NAME=$(python3 -c "
          import json
          data = json.load(open('$APP_JSON'))
          name = data.get('expo', data).get('name', 'frontendxapp')
          print(name)
          ")

          # Sanitize name for bundle ID: lowercase, alphanumeric + hyphens only
          SAFE_NAME=$(echo "$RAW_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

          BUNDLE_ID="com.frontendx.${SAFE_NAME}"

          echo "bundle_id=$BUNDLE_ID"   >> "$GITHUB_OUTPUT"
          echo "scheme=$RAW_NAME"       >> "$GITHUB_OUTPUT"
          echo "safe_name=$SAFE_NAME"   >> "$GITHUB_OUTPUT"

          echo "Derived bundle ID : $BUNDLE_ID"
          echo "Derived scheme    : $RAW_NAME"

      # Inject the generated bundle ID into app.json before expo prebuild
      # so the native Xcode project is generated with the correct identifier.
      - name: Patch app.json with derived bundle ID
        run: |
          python3 - <<'EOF'
          import json

          path = "project/app.json"
          with open(path) as f:
              data = json.load(f)

          bundle_id = "${{ steps.appinfo.outputs.bundle_id }}"

          root = data.get("expo", data)
          root.setdefault("ios", {})["bundleIdentifier"] = bundle_id
          root.setdefault("android", {})["package"] = bundle_id.replace("-", "_")

          with open(path, "w") as f:
              json.dump(data, f, indent=2)

          print(f"Patched bundleIdentifier → {bundle_id}")
          EOF

      # Register the bundle ID via ASC REST API (idempotent).
      # App Store Connect app creation is handled by `produce` in the Fastlane
      # build_ipa lane — the REST API forbids POST /v1/apps for standard accounts.
      - name: Register bundle ID
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_BUNDLE_ID: ${{ steps.appinfo.outputs.bundle_id }}
          XCODE_SCHEME: ${{ steps.appinfo.outputs.scheme }}
        run: |
          ruby - <<'RUBY'
          require 'openssl'
          require 'base64'
          require 'json'
          require 'net/http'
          require 'uri'
          require 'time'

          key_id    = ENV['APP_STORE_CONNECT_KEY_ID']
          issuer_id = ENV['APP_STORE_CONNECT_ISSUER_ID']
          bundle_id = ENV['APP_BUNDLE_ID']
          app_name  = ENV['XCODE_SCHEME']

          private_key = OpenSSL::PKey::EC.new(ENV['APP_STORE_CONNECT_API_KEY'])

          def make_jwt(private_key, key_id, issuer_id)
            header  = Base64.urlsafe_encode64({ alg: 'ES256', kid: key_id, typ: 'JWT' }.to_json).tr('=', '')
            now     = Time.now.to_i
            payload = Base64.urlsafe_encode64({ iss: issuer_id, iat: now, exp: now + 1200, aud: 'appstoreconnect-v1' }.to_json).tr('=', '')
            signing_input = "#{header}.#{payload}"
            der = private_key.sign(OpenSSL::Digest::SHA256.new, signing_input)
            asn = OpenSSL::ASN1.decode(der)
            r   = asn.value[0].value.to_s(2).rjust(32, "\x00")[-32..]
            s   = asn.value[1].value.to_s(2).rjust(32, "\x00")[-32..]
            "#{signing_input}.#{Base64.urlsafe_encode64(r + s).tr('=', '')}"
          end

          http = Net::HTTP.new('api.appstoreconnect.apple.com', 443)
          http.use_ssl = true

          def headers(token)
            { 'Authorization' => "Bearer #{token}", 'Content-Type' => 'application/json' }
          end

          # Register bundle ID (idempotent — 409 means already exists)
          token = make_jwt(private_key, key_id, issuer_id)
          req = Net::HTTP::Post.new('/v1/bundleIds', headers(token))
          req.body = {
            data: {
              type: 'bundleIds',
              attributes: { identifier: bundle_id, name: app_name, platform: 'IOS' }
            }
          }.to_json
          resp = http.request(req)
          if resp.code == '409'
            puts "Bundle ID #{bundle_id} already registered."
          elsif resp.code.start_with?('2')
            puts "Registered bundle ID #{bundle_id}."
          else
            puts "ERROR registering bundle ID (#{resp.code}): #{resp.body}"
            exit 1
          end
          RUBY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS dependencies
        working-directory: project
        run: npm install

      - name: Expo prebuild (generate native iOS project)
        working-directory: project
        run: npx expo prebuild --clean --platform ios

      # Detect the actual Xcode scheme from the generated project.
      # The scheme file name is the source of truth — safer than relying on
      # app.json name which may be normalized differently by expo prebuild.
      - name: Detect Xcode scheme
        id: scheme
        run: |
          SCHEME_FILE=$(find project/ios -name "*.xcscheme" | head -1)
          if [ -n "$SCHEME_FILE" ]; then
            SCHEME=$(basename "$SCHEME_FILE" .xcscheme)
          else
            echo "No .xcscheme found — falling back to app.json name"
            SCHEME="${{ steps.appinfo.outputs.scheme }}"
          fi
          echo "name=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Detected scheme: $SCHEME"

      - name: List ios directory (debug)
        run: find project/ios -maxdepth 3 -name "*.xcworkspace" -o -name "*.xcodeproj" | head -20

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false
          working-directory: project

      - name: Install gems
        working-directory: project
        run: |
          bundle config set frozen false
          bundle install --jobs 4 --retry 3

      - name: Run Fastlane build_ipa
        working-directory: project
        # If FASTLANE_SESSION is missing/expired/invalid, Spaceship falls
        # back to an interactive 2FA prompt that reads from stdin — which
        # never resolves on a non-interactive runner. Bound it here so that
        # failure shows up as a fast, clear timeout instead of silently
        # consuming the whole 90-minute job timeout. Wide enough to cover
        # the lane's priming build + re-install + real archive (see Fastfile).
        timeout-minutes: 45
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_PAT_B64: ${{ secrets.MATCH_GIT_PAT_B64 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_FILEPATH: /tmp/authkey.p8
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          MATCH_KEYCHAIN_NAME: "fastlane_match_keychain"
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_COMPANY_NAME: ${{ secrets.APPLE_COMPANY_NAME }}
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          FASTLANE_SESSION: ${{ secrets.FASTLANE_SESSION }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # Auto-derived per app — not stored as secrets
          APP_BUNDLE_ID: ${{ steps.appinfo.outputs.bundle_id }}
          XCODE_SCHEME: ${{ steps.scheme.outputs.name }}
        run: |
          printf '%s' "$APP_STORE_CONNECT_API_KEY" > /tmp/authkey.p8
          bundle exec fastlane ios build_ipa

      - name: Upload IPA artifact
        id: upload_artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa-${{ inputs.job_id }}
          path: project/build/app.ipa
          retention-days: 7

      # No callback step needed — the backend polls GitHub Actions API directly.
