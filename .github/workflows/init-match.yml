name: Initialize Match (run once)

on:
  workflow_dispatch:
    inputs:
      match_type:
        description: "Certificate type to initialize"
        required: true
        default: "app-store"
        type: choice
        options:
          - app-store
          - development
          - adhoc

jobs:
  init-match:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Install gems
        run: |
          bundle config set frozen false
          bundle install --jobs 4 --retry 3

      - name: Write App Store Connect API Key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          printf '%s' "$APP_STORE_CONNECT_API_KEY" > /tmp/authkey.p8

      - name: Initialize Match via Fastlane
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_PAT_B64: ${{ secrets.MATCH_GIT_PAT_B64 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_FILEPATH: /tmp/authkey.p8
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          MATCH_TYPE: ${{ inputs.match_type }}
        run: bundle exec fastlane ios init_match
